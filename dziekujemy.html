<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gotowość potwierdzona | Amber Resilience</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/premium-core.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body class="font-body bg-brand-dark text-brand-ivory selection:bg-brand-gold selection:text-brand-dark">

    <div data-barba="wrapper">
        <main data-barba="container" data-barba-namespace="thankyou" class="min-h-screen flex flex-col justify-center items-center py-20 px-8">
            
            <div class="text-center max-w-2xl fade-in-up">
                <span class="block text-brand-gold font-mono text-[10px] tracking-[0.4em] uppercase mb-8">Gotowość potwierdzona</span>
                
                <h1 class="font-display text-6xl md:text-8xl text-brand-ivory leading-[1.1] mb-10">
                    Dziękujemy.
                </h1>
                
                <p class="font-light text-brand-muted text-lg md:text-xl leading-relaxed mb-12">
                    Twoje zamówienie zostało zarejestrowane w systemie. Przygotowujemy Twój zestaw z najwyższą dbałością o każdy detal. Wkrótce otrzymasz potwierdzenie operacyjne na adres e-mail.
                </p>

                <div class="flex flex-col sm:flex-row gap-6 justify-center">
                    <a href="index.html" class="group relative inline-flex items-center justify-center px-10 py-5 bg-brand-gold text-brand-dark hover:bg-brand-ivory transition-all duration-500 cursor-pointer outline-none">
                        <span class="relative z-10 font-mono text-[10px] uppercase tracking-[0.4em] font-bold">Powrót do bazy</span>
                    </a>
                    <a href="blog/baza-wiedzy.html" class="group relative inline-flex items-center justify-center px-10 py-5 bg-transparent border border-white/10 hover:border-brand-gold transition-all duration-500 cursor-pointer outline-none">
                        <span class="relative z-10 font-mono text-[10px] uppercase tracking-[0.4em] text-brand-ivory group-hover:text-brand-gold transition-colors duration-500">Baza Wiedzy</span>
                    </a>
                </div>
            </div>

            <div class="absolute bottom-16 opacity-30">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5" class="text-brand-gold"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
            </div>

        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@barba/core"></script>
    <script src="assets/js/cinematic-routing.js"></script>
