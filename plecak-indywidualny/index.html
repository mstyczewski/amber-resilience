    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#C5A059',
                            dark: '#050505',
                            surface: '#111111',
                            ivory: '#F9F7F2',
                            muted: '#A3A3A3'

                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"Outfit"', 'sans-serif'],

            }
        }
    </script>

    <style>
        body { background-color: theme('colors.brand.dark'); color: theme('colors.brand.ivory'); -webkit-font-smoothing: antialiased; }
        ::selection { background-color: rgba(197, 160, 89, 0.3); color: theme('colors.brand.ivory'); }
        ::-webkit-scrollbar { width: 4px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #C5A059; }

        .fade-in-up { opacity: 0; transform: translateY(30px); transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .fade-in-up.visible { opacity: 1; transform: translateY(0); }

        .img-premium-filter {
            filter: grayscale(100%) contrast(1.1) brightness(0.6);
            mix-blend-mode: luminosity;
            transition: filter 1.5s ease, transform 2s ease;
        }
        .group:hover .img-premium-filter {
            filter: grayscale(30%) contrast(1.1) brightness(0.9);
            transform: scale(1.05);
        }

        /* Akordeon */
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .accordion-item.active .accordion-content { max-height: 1000px; }
        .accordion-item.active .accordion-icon { transform: rotate(180deg); }
    </style>
</head>
